        { name: "EMP Mini Ch 1-3", practiceUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775535849668", mockUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775535849668", chapter: "EMP Ch 1-3 (quick)", category: "emp" },
        { name: "EMP Mini Ch 4-5", practiceUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775535990508", mockUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775535990508", chapter: "EMP Ch 4-5", category: "emp" },
        { name: "EMP Mini Ch 6-7", practiceUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775536028692", mockUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775536028692", chapter: "EMP Ch 6-7", category: "emp" },
        { name: "EMP Test #1 (All 1-7)", practiceUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775536066886", mockUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775536066886", chapter: "EMP Full Syllabus #1", category: "emp" },
        { name: "EMP Test #2 (All 1-7)", practiceUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775536087079", mockUrl: "https://script.google.com/macros/s/AKfycbx-c5Y-kRpMwHyyHGO8fcUceFwa3nZG36Itwhg_NchMsDciNUiim842mXwT_KvXz2hf/exec?testId=TEST_1775536087079", chapter: "EMP Full Syllabus #2", category: "emp" }
    ];

    // Group by category then chapter title
    function buildPanels() {
        const panels = { tt: [], wcs: [], emp: [] };
        rawTests.forEach(t => {
            if (!panels[t.category]) return;
            const existing = panels[t.category].find(g => g.chapter === t.chapter);
            if (existing) {
                if (!existing.practiceUrl && t.practiceUrl) existing.practiceUrl = t.practiceUrl;
                if (!existing.mockUrl && t.mockUrl) existing.mockUrl = t.mockUrl;
            } else {
                panels[t.category].push({ chapter: t.chapter, practiceUrl: t.practiceUrl, mockUrl: t.mockUrl });
            }
        });
        return panels;
    }

    const grouped = buildPanels();

    function renderPanel(category, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const data = grouped[category];
        if (!data || data.length === 0) { container.innerHTML = `<div class="chapter-block"><p>No tests available</p></div>`; return; }
        let html = `<div class="panel-header"><h2 class="panel-title" data-en="${category.toUpperCase()} Tests" data-mr="${category.toUpperCase()} चाचण्या">${category.toUpperCase()} Tests</h2><button class="back-home">🏠 Back to Main</button></div>`;
        data.forEach(item => {
            const cleanChapter = item.chapter.replace(/^(Ch[:\s\d]*)/i, '').replace(/^[-:\s]+/, '').trim();
            html += `<div class="chapter-block">
                        <div class="chapter-title">📘 ${cleanChapter}</div>
                        <div class="test-buttons">
                            ${item.practiceUrl ? `<a href="${item.practiceUrl}" target="_blank" rel="noopener noreferrer" class="btn-practice">📝 PRACTICE TEST <span class="btn-smallnote">(orange)</span></a>` : ''}
                            ${item.mockUrl ? `<a href="${item.mockUrl}" target="_blank" rel="noopener noreferrer" class="btn-mock">🎯 MOCK TEST <span class="btn-smallnote">(green)</span></a>` : ''}
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        const backBtn = container.querySelector('.back-home');
        if (backBtn) backBtn.addEventListener('click', () => showCategorySelection());
    }

    function showCategorySelection() {
        document.querySelectorAll('.test-panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById('categoryGrid').style.display = 'flex';
    }

    function activateCategory(category) {
        document.getElementById('categoryGrid').style.display = 'none';
        document.querySelectorAll('.test-panel').forEach(p => p.classList.remove('active-panel'));
        let panelId = '';
        if (category === 'tt') panelId = 'ttPanel';
        else if (category === 'wcs') panelId = 'wcsPanel';
        else if (category === 'emp') panelId = 'empPanel';
        if (panelId) {
            renderPanel(category, panelId);
            document.getElementById(panelId).classList.add('active-panel');
        }
    }

    // event listeners for category cards
    document.querySelectorAll('.cat-card').forEach(card => {
        card.addEventListener('click', (e) => {
            const cat = card.getAttribute('data-category');
            if (cat) activateCategory(cat);
        });
    });

    // bilingual logic
    let currentLang = 'en';
    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-en]').forEach(el => {
            const txt = el.getAttribute(`data-${lang}`);
            if (txt) el.innerText = txt;
        });
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if ((lang === 'en' && btn.getAttribute('data-lang') === 'en') ||
                (lang === 'mr' && btn.getAttribute('data-lang') === 'mr')) {
                btn.classList.add('active');
            } else btn.classList.remove('active');
        });
        // re-render active panel to update titles inside dynamic content
        const activePanel = document.querySelector('.test-panel.active-panel');
        if (activePanel) {
            const which = activePanel.id;
            if (which === 'ttPanel') renderPanel('tt', 'ttPanel');
            else if (which === 'wcsPanel') renderPanel('wcs', 'wcsPanel');
            else if (which === 'empPanel') renderPanel('emp', 'empPanel');
        }
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
    });
    setLanguage('en');
    // initially no panel active, show grid
    showCategorySelection();
</script>
